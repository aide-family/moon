syntax = "proto3";

package magicbox.enum;

option go_package = "github.com/aide-family/magicbox/enum;enum";
option java_multiple_files = true;
option java_package = "magicbox.enum";

enum Environment {
	UNKNOWN = 0;
	DEV = 1;
	TEST = 2;
	PREVIEW = 3;
	PROD = 4;
}

enum GlobalStatus {
	GlobalStatus_UNKNOWN = 0;
	ENABLED = 1;
	DISABLED = 2;
}

enum LevelType {
	LEVEL_TYPE_UNKNOWN = 0;
	LEVEL_TYPE_ALERT = 1;
	LEVEL_TYPE_DATASOURCE = 2;
}

enum WebhookAPP {
	WebhookAPP_UNKNOWN = 0;
	OTHER = 2000;
	DINGTALK = 2001;
	WECHAT = 2002;
	FEISHU = 2003;
}

enum HTTPMethod {
	HTTPMethod_UNKNOWN = 0;
	GET = 1;
	POST = 2;
	PUT = 3;
	DELETE = 4;
	PATCH = 5;
}

enum MessageStatus {
	MessageStatus_UNKNOWN = 0;
	PENDING = 1;
	SENDING = 2;
	SENT = 3;
	FAILED = 4;
	CANCELLED = 5;
}

enum MessageType {
	MessageType_UNKNOWN = 0;
	EMAIL = 1;
	SMS_ALICLOUD = 1000;
	WEBHOOK_OTHER = 2000;
	WEBHOOK_DINGTALK = 2001;
	WEBHOOK_WECHAT = 2002;
	WEBHOOK_FEISHU = 2003;
}

enum DatasourceType {
	DatasourceType_UNKNOWN = 0;
	METRICS = 1;
	LOGS = 1001;
	TRACE = 2001;
}

enum DatasourceDriver {
	DatasourceDriver_UNKNOWN = 0;
	METRICS_PROMETHEUS = 1;
	METRICS_VICTORIA_METRICS = 2;
	LOGS_ELASTICSEARCH = 1001;
	TRACE_JAEGER = 2001;
}

enum UserStatus {
	UserStatus_UNKNOWN = 0;
	ACTIVE = 1;
	BANNED = 2;
}

enum MemberStatus {
	MemberStatus_UNKNOWN = 0;
	JOINED = 1;
	INVITED = 2;
	EXPIRED = 3;
}

enum MemberRole {
	MEMBER = 0;
	OWNER = 1;
	ADMIN = 2;
	VIEW = 3;
}

// SSHCommandAuditKind classifies a pending change to an SSH command template (Jade Tree).
enum SSHCommandAuditKind {
	SSHCommandAuditKind_UNKNOWN = 0;
	SSHCommandAuditKind_CREATE = 1;
	SSHCommandAuditKind_UPDATE = 2;
}

// SSHCommandAuditStatus is the lifecycle state of an SSH command audit record (Jade Tree).
enum SSHCommandAuditStatus {
	SSHCommandAuditStatus_UNKNOWN = 0;
	SSHCommandAuditStatus_PENDING = 1;
	SSHCommandAuditStatus_APPROVED = 2;
	SSHCommandAuditStatus_REJECTED = 3;
}