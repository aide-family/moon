syntax = "proto3";

package marksman.api.v1;

option go_package = "github.com/aide-family/marksman/pkg/api/v1;v1";
option java_multiple_files = true;
option java_package = "marksman.api.v1";

import "google/api/annotations.proto";
import "buf/validate/validate.proto";
import "magicbox/enum/enum.proto";

service Datasource {
	rpc CreateDatasource (CreateDatasourceRequest) returns (CreateDatasourceReply) {
		option (google.api.http) = {
			post: "/v1/datasource"
			body: "*"
		};
	}
	rpc UpdateDatasource (UpdateDatasourceRequest) returns (UpdateDatasourceReply) {
		option (google.api.http) = {
			put: "/v1/datasource/{uid}"
			body: "*"
		};
	}
	rpc DeleteDatasource (DeleteDatasourceRequest) returns (DeleteDatasourceReply) {
		option (google.api.http) = {
			delete: "/v1/datasource/{uid}"
		};
	}
	rpc GetDatasource (GetDatasourceRequest) returns (DatasourceItem) {
		option (google.api.http) = {
			get: "/v1/datasource/{uid}"
		};
	}
	rpc ListDatasource (ListDatasourceRequest) returns (ListDatasourceReply) {
		option (google.api.http) = {
			get: "/v1/datasources"
		};
	}
	rpc SelectDatasource (SelectDatasourceRequest) returns (SelectDatasourceReply) {
		option (google.api.http) = {
			get: "/v1/datasources/select"
		};
	}
	// GetDatasourceStatus returns recent status series (last 1h by default) from main time-series DB (Prometheus/VM).
	rpc GetDatasourceStatus (GetDatasourceStatusRequest) returns (GetDatasourceStatusReply) {
		option (google.api.http) = {
			get: "/v1/datasource/{uid}/status"
		};
	}
	// ListMetrics returns the list of metric names with basic metadata (name, help, unit, type) for a metrics datasource.
	rpc ListMetrics (ListMetricsRequest) returns (ListMetricsReply) {
		option (google.api.http) = {
			get: "/v1/datasource/{uid}/metrics"
		};
	}
	// GetMetricLabelDetail returns one metric's labels and each label's values (detail view for a single metric).
	rpc GetMetricDetail (GetMetricDetailRequest) returns (MetricDetailItem) {
		option (google.api.http) = {
			get: "/v1/datasource/{uid}/metric/{metric}"
		};
	}
}

message DatasourceItem {
	int64 uid = 1;
	string name = 2;
	magicbox.enum.DatasourceType type = 3;
	magicbox.enum.DatasourceDriver driver = 4;
	map<string, string> metadata = 5;
	magicbox.enum.GlobalStatus status = 6;
	string createdAt = 7;
	string updatedAt = 8;
	string url = 9;
	string remark = 10;
}

message CreateDatasourceRequest {
	string name = 1 [(buf.validate.field).required = true, (buf.validate.field).string = {
		min_len: 3,
		max_len: 100,
	}];
	magicbox.enum.DatasourceType type = 2 [(buf.validate.field).required = true, (buf.validate.field).cel = {
		expression: "this in [magicbox.enum.DatasourceType.METRICS, magicbox.enum.DatasourceType.LOGS, magicbox.enum.DatasourceType.TRACE]",
		message: "type must be in ['METRICS', 'LOGS', 'TRACE']",
	}];
	magicbox.enum.DatasourceDriver driver = 3 [(buf.validate.field).required = true, (buf.validate.field).cel = {
		expression: "this in [magicbox.enum.DatasourceDriver.METRICS_PROMETHEUS, magicbox.enum.DatasourceDriver.METRICS_VICTORIA_METRICS, magicbox.enum.DatasourceDriver.LOGS_ELASTICSEARCH, magicbox.enum.DatasourceDriver.TRACE_JAEGER]",
		message: "driver must be in ['METRICS_PROMETHEUS', 'METRICS_VICTORIA_METRICS', 'LOGS_ELASTICSEARCH', 'TRACE_JAEGER']",
	}];
	map<string, string> metadata = 4;
	string url = 5 [(buf.validate.field).required = true, (buf.validate.field).cel = {
		expression: "this.isUri()",
		message: "url must be a valid URL",
	}];
	string remark = 6 [(buf.validate.field).string = {
		max_len: 1000,
	}];
}
message CreateDatasourceReply {
	int64 uid = 1;
}

message UpdateDatasourceRequest {
	int64 uid = 1 [(buf.validate.field).required = true, (buf.validate.field).cel = {
		expression: "this > 0",
		message: "uid must be greater than 0",
	}];
	string name = 2 [(buf.validate.field).required = true, (buf.validate.field).string = {
		min_len: 3,
		max_len: 100,
	}];
	magicbox.enum.DatasourceType type = 3 [(buf.validate.field).required = true, (buf.validate.field).cel = {
		expression: "this in [magicbox.enum.DatasourceType.METRICS, magicbox.enum.DatasourceType.LOGS, magicbox.enum.DatasourceType.TRACE]",
		message: "type must be in ['METRICS', 'LOGS', 'TRACE']",
	}];
	magicbox.enum.DatasourceDriver driver = 4 [(buf.validate.field).required = true, (buf.validate.field).cel = {
		expression: "this in [magicbox.enum.DatasourceDriver.METRICS_PROMETHEUS, magicbox.enum.DatasourceDriver.METRICS_VICTORIA_METRICS, magicbox.enum.DatasourceDriver.LOGS_ELASTICSEARCH, magicbox.enum.DatasourceDriver.TRACE_JAEGER]",
		message: "driver must be in ['METRICS_PROMETHEUS', 'METRICS_VICTORIA_METRICS', 'LOGS_ELASTICSEARCH', 'TRACE_JAEGER']",
	}];
	map<string, string> metadata = 5;
	string url = 6 [(buf.validate.field).required = true, (buf.validate.field).cel = {
		expression: "this.isUri()",
		message: "url must be a valid URL",
	}];
	string remark = 7 [(buf.validate.field).string = {
		max_len: 1000,
	}];
}
message UpdateDatasourceReply {}

message DeleteDatasourceRequest {
	int64 uid = 1 [(buf.validate.field).required = true];
}
message DeleteDatasourceReply {}

message GetDatasourceRequest {
	int64 uid = 1 [(buf.validate.field).required = true];
}

message ListDatasourceRequest {
	string keyword = 1 [(buf.validate.field).cel = {
		expression: "this.size() <= 100",
		message: "keyword must be less than or equal to 100",
	}];
	int32 page = 2 [(buf.validate.field).required = true, (buf.validate.field).cel = {
		expression: "this >= 1",
		message: "page must be greater than or equal to 1",
	}];
	int32 pageSize = 3 [(buf.validate.field).required = true, (buf.validate.field).cel = {
		expression: "this >= 1 && this <= 200",
		message: "pageSize must be greater than or equal to 1 and less than or equal to 200",
	}];
	magicbox.enum.DatasourceType type = 4;
	magicbox.enum.DatasourceDriver driver = 5;
	magicbox.enum.GlobalStatus status = 6;
}
message ListDatasourceReply {
	repeated DatasourceItem items = 1;
	int64 total = 2;
	int32 page = 3;
	int32 pageSize = 4;
}

message SelectDatasourceRequest {
	string keyword = 1 [(buf.validate.field).cel = {
		expression: "this.size() <= 100",
		message: "keyword must be less than or equal to 100",
	}];
	int32 limit = 2 [(buf.validate.field).required = true, (buf.validate.field).cel = {
		expression: "this >= 1 && this <= 100",
		message: "limit must be greater than or equal to 1 and less than or equal to 100",
	}];
	int64 lastUID = 3;
	magicbox.enum.DatasourceType type = 4;
	magicbox.enum.DatasourceDriver driver = 5;
	magicbox.enum.GlobalStatus status = 6;
	repeated int64 uids = 7;
}
message SelectDatasourceItem {
	int64 value = 1;
	string label = 2;
	bool disabled = 3;
	string tooltip = 4;
	magicbox.enum.DatasourceType type = 5;
	magicbox.enum.DatasourceDriver driver = 6;
	string url = 7;
}
message SelectDatasourceReply {
	repeated SelectDatasourceItem items = 1;
	int64 total = 2;
	int64 lastUID = 3;
	bool hasMore = 4;
}

message GetDatasourceStatusRequest {
	int64 uid = 1 [(buf.validate.field).required = true];
	// Unix timestamp (seconds). Default: now - 1h.
	int64 startTime = 2;
	// Unix timestamp (seconds). Default: now.
	int64 endTime = 3;
	// Step in seconds for downsampling. Default: 60.
	// Step in seconds (15–3600). Default 60 if not set.
	int32 stepSeconds = 4;
}
message GetDatasourceStatusReply {
	repeated DatasourceStatusSeries series = 1;
}
message DatasourceStatusSeries {
	int64 uid = 1;
	string name = 2;
	repeated DatasourceStatusPoint points = 3;
}
message DatasourceStatusPoint {
	int64 timestamp = 1;  // Unix seconds
	double value = 2;     // 1 = healthy, 0 = unhealthy
}

message ListMetricsRequest {
	int64 uid = 1 [(buf.validate.field).required = true, (buf.validate.field).cel = {
		expression: "this > 0",
		message: "uid must be greater than 0",
	}];
}
message ListMetricsReply {
	repeated MetricSummaryItem metrics = 1;
}
// MetricSummaryItem: metric list item (no label detail). Uses help to align with Prometheus metadata.
message MetricSummaryItem {
	string name = 1;
	string help = 2;   // Prometheus metadata help (说明信息)
	string unit = 3;
	string type = 4;   // e.g. "counter", "gauge"
}

message GetMetricDetailRequest {
	int64 uid = 1 [(buf.validate.field).required = true, (buf.validate.field).cel = {
		expression: "this > 0",
		message: "uid must be greater than 0",
	}];
	// Metric name to query label detail for (e.g. "http_requests_total", "up").
	string metric = 2 [(buf.validate.field).required = true, (buf.validate.field).string = {
		min_len: 1,
		max_len: 512,
	}];
}

message MetricDetailItem {
	string name = 1;
	string help = 2;
	string unit = 3;
	string type = 4;
	repeated MetricLabelItem labels = 5;
}
message MetricLabelItem {
	string name = 1;
	repeated string values = 2;
}