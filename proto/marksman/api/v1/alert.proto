syntax = "proto3";

package marksman.api.v1;

option go_package = "github.com/aide-family/marksman/pkg/api/v1;v1";
option java_multiple_files = true;
option java_package = "marksman.api.v1";

import "google/api/annotations.proto";
import "buf/validate/validate.proto";
import "magicbox/enum/alert.proto";


// Alert service: alert page CRUD and real-time alert list/operations.
service Alert {
	rpc CreateAlertPage (CreateAlertPageRequest) returns (CreateAlertPageReply) {
		option (google.api.http) = {
			post: "/v1/alert/alert-pages"
			body: "*"
		};
	}
	rpc UpdateAlertPage (UpdateAlertPageRequest) returns (UpdateAlertPageReply) {
		option (google.api.http) = {
			put: "/v1/alert/alert-pages/{uid}"
			body: "*"
		};
	}
	rpc DeleteAlertPage (DeleteAlertPageRequest) returns (DeleteAlertPageReply) {
		option (google.api.http) = {
			delete: "/v1/alert/alert-pages/{uid}"
		};
	}
	rpc GetAlertPage (GetAlertPageRequest) returns (AlertPageItem) {
		option (google.api.http) = {
			get: "/v1/alert/alert-pages/{uid}"
		};
	}
	rpc ListAlertPage (ListAlertPageRequest) returns (ListAlertPageReply) {
		option (google.api.http) = {
			get: "/v1/alert/alert-pages"
		};
	}
	rpc ListRealtimeAlert (ListRealtimeAlertRequest) returns (ListRealtimeAlertReply) {
		option (google.api.http) = {
			get: "/v1/alert/alert-pages/{alertPageUid}/realtime-alerts"
		};
	}
	rpc InterveneAlert (InterveneAlertRequest) returns (InterveneAlertReply) {
		option (google.api.http) = {
			post: "/v1/alert/realtime-alerts/{uid}/intervene"
			body: "*"
		};
	}
	rpc SuppressAlert (SuppressAlertRequest) returns (SuppressAlertReply) {
		option (google.api.http) = {
			post: "/v1/alert/realtime-alerts/{uid}/suppress"
			body: "*"
		};
	}
	rpc RecoverAlert (RecoverAlertRequest) returns (RecoverAlertReply) {
		option (google.api.http) = {
			post: "/v1/alert/realtime-alerts/{uid}/recover"
			body: "*"
		};
	}
	// GetAlertStatistics returns alert counts for the dashboard: total active, by level, today recovered, by alert page.
	rpc GetAlertStatistics (GetAlertStatisticsRequest) returns (GetAlertStatisticsReply) {
		option (google.api.http) = {
			get: "/v1/alert/statistics"
		};
	}
	// ListUserAlertPages returns the current user's followed alert pages (personal config).
	rpc ListUserAlertPages (ListUserAlertPagesRequest) returns (ListUserAlertPagesReply) {
		option (google.api.http) = {
			get: "/v1/alert/user/alert-pages"
		};
	}
	// SaveUserAlertPages saves the current user's followed alert pages (replaces existing list).
	rpc SaveUserAlertPages (SaveUserAlertPagesRequest) returns (SaveUserAlertPagesReply) {
		option (google.api.http) = {
			put: "/v1/alert/user/alert-pages"
			body: "*"
		};
	}
}

// AlertPageFilter defines which alerts belong to a page (any match).
message AlertPageFilter {
	repeated int64 strategyGroupUids = 1;
	repeated int64 levelUids = 2;
	repeated int64 strategyUids = 3;
}

// AlertPageItem is a single alert page (view/category) for grouping real-time alerts.
message AlertPageItem {
	int64 uid = 1;
	string name = 2;
	string color = 3;
	int32 sortOrder = 4;
	AlertPageFilter filter = 5;
	string createdAt = 6;
	string updatedAt = 7;
}

// CreateAlertPageRequest creates a new alert page.
message CreateAlertPageRequest {
	string name = 1 [(buf.validate.field).required = true, (buf.validate.field).string = {
		max_len: 100,
	}];
	string color = 2 [(buf.validate.field).string = {
		max_len: 32,
	}];
	int32 sortOrder = 3;
	AlertPageFilter filter = 4;
}
message CreateAlertPageReply {
	int64 uid = 1;
}

// UpdateAlertPageRequest updates an alert page.
message UpdateAlertPageRequest {
	int64 uid = 1 [(buf.validate.field).required = true, (buf.validate.field).cel = {
		expression: "this > 0",
		message: "uid must be greater than 0",
	}];
	string name = 2 [(buf.validate.field).required = true, (buf.validate.field).string = {
		max_len: 100,
	}];
	string color = 3 [(buf.validate.field).string = {
		max_len: 32,
	}];
	int32 sortOrder = 4;
	AlertPageFilter filter = 5;
}
message UpdateAlertPageReply {}

// DeleteAlertPageRequest deletes an alert page.
message DeleteAlertPageRequest {
	int64 uid = 1 [(buf.validate.field).required = true];
}
message DeleteAlertPageReply {}

// GetAlertPageRequest gets a single alert page.
message GetAlertPageRequest {
	int64 uid = 1 [(buf.validate.field).required = true];
}

// ListAlertPageRequest lists alert pages.
message ListAlertPageRequest {
	int32 page = 1 [(buf.validate.field).required = true, (buf.validate.field).cel = {
		expression: "this >= 1",
		message: "page must be greater than or equal to 1",
	}];
	int32 pageSize = 2 [(buf.validate.field).required = true, (buf.validate.field).cel = {
		expression: "this >= 1 && this <= 200",
		message: "pageSize must be between 1 and 200",
	}];
	string keyword = 3 [(buf.validate.field).cel = {
		expression: "this.size() <= 100",
		message: "keyword length must be <= 100",
	}];
}
message ListAlertPageReply {
	int64 total = 1;
	int32 page = 2;
	int32 pageSize = 3;
	repeated AlertPageItem items = 4;
}

// AlertEventItem is a single real-time alert event.
message AlertEventItem {
	int64 uid = 1;
	int64 strategyUid = 2;
	int64 namespaceUid = 3;
	int64 levelUid = 4;
	string levelName = 5;
	string summary = 6;
	string description = 7;
	string expr = 8;
	string firedAt = 9;
	double value = 10;
	map<string, string> labels = 11;
	int64 datasourceUid = 12;
	magicbox.enum.AlertEventStatus status = 13;
	string intervenedAt = 14;
	int64 intervenedBy = 15;
	string suppressUntilAt = 16;
	int64 suppressedBy = 17;
	string suppressedReason = 18;
	string recoveredAt = 19;
	int64 recoveredBy = 20;
	string recoveredReason = 21;
}

// ListRealtimeAlertRequest lists real-time alert events for an alert page.
message ListRealtimeAlertRequest {
	int64 alertPageUid = 1 [(buf.validate.field).required = true, (buf.validate.field).cel = {
		expression: "this > 0",
		message: "alertPageUid must be greater than 0",
	}];
	int32 page = 2 [(buf.validate.field).required = true, (buf.validate.field).cel = {
		expression: "this >= 1",
		message: "page must be >= 1",
	}];
	int32 pageSize = 3 [(buf.validate.field).required = true, (buf.validate.field).cel = {
		expression: "this >= 1 && this <= 200",
		message: "pageSize must be between 1 and 200",
	}];
	// Filter by status; empty means all statuses.
	magicbox.enum.AlertEventStatus status = 4;
	// Time range for fired_at (Unix seconds). If both 0, backend defaults to last 14 days.
	int64 startAtUnix = 5;
	int64 endAtUnix = 6;
}
message ListRealtimeAlertReply {
	int64 total = 1;
	int32 page = 2;
	int32 pageSize = 3;
	repeated AlertEventItem items = 4;
}

// InterveneAlertRequest marks an event as intervened (on-call has taken over).
message InterveneAlertRequest {
	int64 uid = 1 [(buf.validate.field).required = true, (buf.validate.field).cel = {
		expression: "this > 0",
		message: "uid must be greater than 0",
	}];
}
message InterveneAlertReply {}

// SuppressAlertRequest suppresses an event until a given time (known issue).
message SuppressAlertRequest {
	int64 uid = 1 [(buf.validate.field).required = true, (buf.validate.field).cel = {
		expression: "this > 0",
		message: "uid must be greater than 0",
	}];
	// Suppress until this time (Unix seconds); required.
	int64 suppressUntilUnix = 2 [(buf.validate.field).required = true, (buf.validate.field).cel = {
		expression: "this >= 0",
		message: "suppressUntilUnix must be greater than or equal to 0",
	}];
	string suppressedReason = 3 [(buf.validate.field).required = true, (buf.validate.field).string = {
		max_len: 1000,
	}];
}
message SuppressAlertReply {}

// RecoverAlertRequest marks an event as manually recovered.
message RecoverAlertRequest {
	int64 uid = 1 [(buf.validate.field).required = true, (buf.validate.field).cel = {
		expression: "this > 0",
		message: "uid must be greater than 0",
	}];
	string recoveredReason = 3 [(buf.validate.field).required = true, (buf.validate.field).string = {
		max_len: 1000,
	}];
}
message RecoverAlertReply {}

// GetAlertStatisticsRequest requests alert statistics for the current namespace (no body).
message GetAlertStatisticsRequest {}

// LevelCount is count of active alerts for one level.
message LevelCount {
	int64 levelUid = 1;
	string levelName = 2;
	int64 count = 3;
}

// AlertPageCount is count of active alerts for one alert page.
message AlertPageCount {
	int64 alertPageUid = 1;
	string alertPageName = 2;
	int64 count = 3;
}

// GetAlertStatisticsReply returns dashboard counts: total active, by level, today recovered, by alert page.
message GetAlertStatisticsReply {
	int64 totalActiveCount = 1;
	repeated LevelCount countByLevel = 2;
	int64 todayRecoveredCount = 3;
	repeated AlertPageCount countByAlertPage = 4;
}

// ListUserAlertPagesRequest requests the current user's followed alert pages (no body).
message ListUserAlertPagesRequest {}

// ListUserAlertPagesReply returns the user's followed alert pages in order.
message ListUserAlertPagesReply {
	repeated AlertPageItem items = 1;
}

// SaveUserAlertPagesRequest saves the user's followed alert pages (order by array index).
message SaveUserAlertPagesRequest {
	repeated int64 alertPageUids = 1 [(buf.validate.field).repeated = {
		max_items: 10,
	}];
}

// SaveUserAlertPagesReply is empty on success.
message SaveUserAlertPagesReply {}
