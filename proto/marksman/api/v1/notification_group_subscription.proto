syntax = "proto3";

package marksman.api.v1;

option go_package = "github.com/aide-family/marksman/pkg/api/v1;v1";
option java_multiple_files = true;
option java_package = "marksman.api.v1";

import "google/api/annotations.proto";
import "buf/validate/validate.proto";

// Subscription filter: when multiple dimensions are set, an alert matches if it satisfies at least one (OR).
// - strategyGroupUids: alert's strategy must belong to one of these groups.
// - strategyUids: alert's strategy_uid must be in this list.
// - strategyLevels: alert's (strategy_uid, level_uid) must be in this list.
// - labels: alert must contain all these key-value pairs with the same values.
// - excludeLabels: alert must not contain any of these key-value pairs (subset match).
// - datasourceUids: alert's datasource must be in this list.
message SubscriptionFilter {
	repeated int64 strategyGroupUids = 1;
	repeated int64 strategyUids = 2;
	repeated StrategyLevelPair strategyLevels = 3;
	repeated int64 datasourceUids = 4;
	map<string, string> labels = 5;
	map<string, string> excludeLabels = 6;
}

message StrategyLevelPair {
	int64 strategyUid = 1;
	int64 levelUid = 2;
}

// NotificationGroupSubscription: get/save subscription filter for a notification group (save creates or overwrites).
service NotificationGroupSubscription {
	rpc GetNotificationGroupSubscription (GetNotificationGroupSubscriptionRequest) returns (GetNotificationGroupSubscriptionReply) {
		option (google.api.http) = {
			get: "/v1/notification-groups/{notificationGroupUid}/subscription"
		};
	}
	rpc SaveNotificationGroupSubscription (SaveNotificationGroupSubscriptionRequest) returns (SaveNotificationGroupSubscriptionReply) {
		option (google.api.http) = {
			put: "/v1/notification-groups/{notificationGroupUid}/subscription"
			body: "*"
		};
	}
}

message GetNotificationGroupSubscriptionRequest {
	int64 notificationGroupUid = 1 [(buf.validate.field).required = true, (buf.validate.field).cel = {
		expression: "this > 0",
		message: "notificationGroupUid must be greater than 0",
	}];
}

message GetNotificationGroupSubscriptionReply {
	SubscriptionFilter filter = 1;
}

message SaveNotificationGroupSubscriptionRequest {
	int64 notificationGroupUid = 1 [(buf.validate.field).required = true, (buf.validate.field).cel = {
		expression: "this > 0",
		message: "notificationGroupUid must be greater than 0",
	}];
	SubscriptionFilter filter = 2;
}

message SaveNotificationGroupSubscriptionReply {}
