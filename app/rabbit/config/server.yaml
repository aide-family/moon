  driver: ${MOON_RABBIT_CAPTCHA_DRIVER:DEFAULT}
  options:
    '@type': '${MOON_RABBIT_CAPTCHA_OPTIONS_TYPE:type.googleapis.com/magicbox.config.DefaultConfig}'
    siteDomain: ${MOON_RABBIT_CAPTCHA_SITE_DOMAIN:localhost:5175}
