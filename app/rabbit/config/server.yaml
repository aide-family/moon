environment: ${MOON_RABBIT_ENVIRONMENT:PROD}
enableSwagger: ${MOON_RABBIT_ENABLE_SWAGGER:true}
enableMetrics: ${MOON_RABBIT_ENABLE_METRICS:true}
useRandomID: ${MOON_RABBIT_USE_RANDOM_NODE_ID:false}

server:
  name: ${MOON_RABBIT_SERVER_NAME:rabbit}
  metadata:
    tag: ${MOON_RABBIT_METADATA_TAG:rabbit}
    repository: ${MOON_RABBIT_METADATA_REPOSITORY:https://github.com/aide-family/rabbit}
    author: ${MOON_RABBIT_METADATA_AUTHOR:Aide Family}
    email: ${MOON_RABBIT_METADATA_EMAIL:aidecloud@163.com}
  http:
    address: '${MOON_RABBIT_HTTP_ADDRESS:0.0.0.0:8001}'
    network: '${MOON_RABBIT_HTTP_NETWORK:tcp}'
    timeout: '${MOON_RABBIT_HTTP_TIMEOUT:10s}'
    protocol: HTTP
  grpc:
    address: '${MOON_RABBIT_GRPC_ADDRESS:0.0.0.0:9001}'
    network: '${MOON_RABBIT_GRPC_NETWORK:tcp}'
    timeout: '${MOON_RABBIT_GRPC_TIMEOUT:10s}'
    protocol: GRPC
  job:
    address: '${MOON_RABBIT_JOB_ADDRESS:0.0.0.0:7001}'
    network: '${MOON_RABBIT_JOB_NETWORK:tcp}'
    timeout: '${MOON_RABBIT_JOB_TIMEOUT:10s}'
    protocol: GRPC

jwt:
  secret: '${MOON_RABBIT_JWT_SECRET:xxx}'
  expire: '${MOON_RABBIT_JWT_EXPIRE:600s}'
  issuer: '${MOON_RABBIT_JWT_ISSUER:rabbit}'

namespaceDomain:
  driver: ${MOON_RABBIT_NAMESPACE_DRIVER:DEFAULT}
  version: ${MOON_RABBIT_NAMESPACE_VERSION:v1}
  options:
    '@type': '${MOON_RABBIT_NAMESPACE_OPTIONS_TYPE:type.googleapis.com/magicbox.config.DefaultConfig}'
    siteDomain: ${MOON_RABBIT_NAMESPACE_SITE_DOMAIN:localhost:5175}
    globalEmail:
      host: ${MOON_RABBIT_DEFAULT_CONFIG_GLOBAL_EMAIL_HOST:localhost}
      port: ${MOON_RABBIT_DEFAULT_CONFIG_GLOBAL_EMAIL_PORT:587}
      username: ${MOON_RABBIT_DEFAULT_CONFIG_GLOBAL_EMAIL_USERNAME:root}
      password: ${MOON_RABBIT_DEFAULT_CONFIG_GLOBAL_EMAIL_PASSWORD:123456}
    database:
      dialector: ${MOON_RABBIT_NAMESPACE_DATABASE_DIALECTOR:SQLITE}
      debug: ${MOON_RABBIT_NAMESPACE_DATABASE_DEBUG:true}
      useSystemLogger: ${MOON_RABBIT_NAMESPACE_DATABASE_USE_SYSTEM_LOGGER:false}
      options:
        '@type': '${MOON_RABBIT_NAMESPACE_DATABASE_OPTIONS_TYPE:type.googleapis.com/magicbox.config.SQLiteOptions}'
        dsn: '${MOON_RABBIT_NAMESPACE_DATABASE_SQLITE_OPTIONS_DSN:file:../goddess/goddess.db?cache=shared}'
    jwt:
      secret: ${MOON_RABBIT_DEFAULT_CONFIG_JWT_SECRET:xxx}
      expire: ${MOON_RABBIT_DEFAULT_CONFIG_JWT_EXPIRE:600s}
      issuer: ${MOON_RABBIT_DEFAULT_CONFIG_JWT_ISSUER:rabbit}

