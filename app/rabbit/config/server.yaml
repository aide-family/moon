        dsn: '${MOON_RABBIT_MEMBER_DATABASE_SQLITE_OPTIONS_DSN:file:../goddess/goddess.db?cache=shared}'
    jwt:
      secret: ${MOON_RABBIT_DEFAULT_CONFIG_JWT_SECRET:xxx}
