jobCluster:
  name: ${MOON_RABBIT_JOB_CLUSTER_NAME:rabbit}
  endpoints: ${MOON_RABBIT_JOB_CLUSTER_ENDPOINTS:http://localhost:18081}
  timeout: '${MOON_RABBIT_JOB_CLUSTER_TIMEOUT:10s}'
  protocol: ${MOON_RABBIT_JOB_CLUSTER_PROTOCOL:HTTP}
