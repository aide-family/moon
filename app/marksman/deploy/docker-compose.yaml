# Prometheus for Marksman metrics
# Run from repo root: docker compose -f app/marksman/deploy/docker-compose.yaml up -d
# Or from app/marksman/deploy: docker compose up -d
# Data is stored under deploy/data (bind mount to current directory)

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: marksman-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    # Linux: resolve host.docker.internal to host (for scraping marksman on host)
    extra_hosts:
      - "host.docker.internal:host-gateway"
