environment: ${MOON_MARKSMAN_ENVIRONMENT:PROD}
enableSwagger: ${MOON_MARKSMAN_ENABLE_SWAGGER:true}
enableMetrics: ${MOON_MARKSMAN_ENABLE_METRICS:true}
useRandomID: ${MOON_MARKSMAN_USE_RANDOM_NODE_ID:false}

server:
  name: ${MOON_MARKSMAN_SERVER_NAME:marksman}
  metadata:
    tag: ${MOON_MARKSMAN_METADATA_TAG:marksman}
    repository: ${MOON_MARKSMAN_METADATA_REPOSITORY:https://github.com/aide-family/marksman}
    author: ${MOON_MARKSMAN_METADATA_AUTHOR:Aide Family}
    email: ${MOON_MARKSMAN_METADATA_EMAIL:aidecloud@163.com}
  http:
    address: '${MOON_MARKSMAN_HTTP_ADDRESS:0.0.0.0:8003}'
    network: '${MOON_MARKSMAN_HTTP_NETWORK:tcp}'
    timeout: '${MOON_MARKSMAN_HTTP_TIMEOUT:10s}'
    protocol: HTTP
  grpc:
    address: '${MOON_MARKSMAN_GRPC_ADDRESS:0.0.0.0:9003}'
    network: '${MOON_MARKSMAN_GRPC_NETWORK:tcp}'
    timeout: '${MOON_MARKSMAN_GRPC_TIMEOUT:10s}'
    protocol: GRPC
  job:
    address: '${MOON_MARKSMAN_JOB_ADDRESS:0.0.0.0:7003}'
    network: '${MOON_MARKSMAN_JOB_NETWORK:tcp}'
    timeout: '${MOON_MARKSMAN_JOB_TIMEOUT:10s}'
    protocol: GRPC

jwt:
  secret: '${MOON_MARKSMAN_JWT_SECRET:xxx}'
  expire: '${MOON_MARKSMAN_JWT_EXPIRE:600s}'
  issuer: '${MOON_MARKSMAN_JWT_ISSUER:marksman}'

# Shared driver config for all domain clients (DEFAULT: DefaultConfig; OUTER: OuterServerConfig).
# When all goddess domains use DEFAULT, set domainDriver to DefaultConfig below.
# When webhook/template/sender use OUTER, set domainDriver to OuterServerConfig (address, timeout, protocol).
domainDriver:
  '@type': '${MOON_MARKSMAN_DOMAIN_DRIVER_TYPE:type.googleapis.com/magicbox.config.DefaultConfig}'
  siteDomain: ${MOON_MARKSMAN_DOMAIN_DRIVER_SITE_DOMAIN:localhost:5175}
  globalEmail:
    host: ${MOON_MARKSMAN_DEFAULT_CONFIG_GLOBAL_EMAIL_HOST:localhost}
    port: ${MOON_MARKSMAN_DEFAULT_CONFIG_GLOBAL_EMAIL_PORT:587}
    username: ${MOON_MARKSMAN_DEFAULT_CONFIG_GLOBAL_EMAIL_USERNAME:root}
    password: ${MOON_MARKSMAN_DEFAULT_CONFIG_GLOBAL_EMAIL_PASSWORD:123456}
  database:
    dialector: ${MOON_MARKSMAN_DOMAIN_DRIVER_DATABASE_DIALECTOR:SQLITE}
    debug: ${MOON_MARKSMAN_DOMAIN_DRIVER_DATABASE_DEBUG:true}
    useSystemLogger: ${MOON_MARKSMAN_DOMAIN_DRIVER_DATABASE_USE_SYSTEM_LOGGER:false}
    options:
      '@type': '${MOON_MARKSMAN_DOMAIN_DRIVER_DATABASE_OPTIONS_TYPE:type.googleapis.com/magicbox.config.SQLiteOptions}'
      dsn: '${MOON_MARKSMAN_DOMAIN_DRIVER_DATABASE_DSN:file:../goddess/goddess.db?cache=shared}'
  jwt:
    secret: ${MOON_MARKSMAN_DEFAULT_CONFIG_JWT_SECRET:xxx}
    expire: ${MOON_MARKSMAN_DEFAULT_CONFIG_JWT_EXPIRE:600s}
    issuer: ${MOON_MARKSMAN_DEFAULT_CONFIG_JWT_ISSUER:marksman}

# Goddess domain configs for namespace, auth, self, user, member and captcha.
# These use DEFAULT driver; set domainDriver to DefaultConfig when using DEFAULT (e.g. MOON_MARKSMAN_DOMAIN_DRIVER_TYPE=type.googleapis.com/magicbox.config.DefaultConfig, plus siteDomain/globalEmail/database/jwt).
namespaceDomain:
  driver: ${MOON_MARKSMAN_NAMESPACE_DRIVER:DEFAULT}
  version: ${MOON_MARKSMAN_NAMESPACE_VERSION:v1}

authDomain:
  driver: ${MOON_MARKSMAN_AUTH_DRIVER:DEFAULT}
  version: ${MOON_MARKSMAN_AUTH_VERSION:v1}

selfDomain:
  driver: ${MOON_MARKSMAN_SELF_DRIVER:DEFAULT}
  version: ${MOON_MARKSMAN_SELF_VERSION:v1}

userDomain:
  driver: ${MOON_MARKSMAN_USER_DRIVER:DEFAULT}
  version: ${MOON_MARKSMAN_USER_VERSION:v1}

memberDomain:
  driver: ${MOON_MARKSMAN_MEMBER_DRIVER:DEFAULT}
  version: ${MOON_MARKSMAN_MEMBER_VERSION:v1}

captchaDomain:
  driver: ${MOON_MARKSMAN_CAPTCHA_DRIVER:DEFAULT}
  version: ${MOON_MARKSMAN_CAPTCHA_VERSION:v1}

# Rabbit domain configs for webhook, message template and sender (call rabbit HTTP API).
# These use OUTER driver; set domainDriver to OuterServerConfig when using OUTER (e.g. MOON_MARKSMAN_DOMAIN_DRIVER_TYPE=type.googleapis.com/magicbox.config.OuterServerConfig, plus address/timeout/protocol).
webhookDomain:
  driver: ${MOON_MARKSMAN_WEBHOOK_DRIVER:DEFAULT}
  version: ${MOON_MARKSMAN_WEBHOOK_VERSION:v1}

messageTemplateDomain:
  driver: ${MOON_MARKSMAN_MESSAGE_TEMPLATE_DRIVER:DEFAULT}
  version: ${MOON_MARKSMAN_MESSAGE_TEMPLATE_VERSION:v1}

senderDomain:
  driver: ${MOON_MARKSMAN_SENDER_DRIVER:DEFAULT}
  version: ${MOON_MARKSMAN_SENDER_VERSION:v1}

# Metric evaluate cron: concurrency, timeouts and job channel capacity.
evaluateConfig:
  concurrencyLimit: ${MOON_MARKSMAN_EVALUATE_CONCURRENCY_LIMIT:10}
  startupDelay: '${MOON_MARKSMAN_EVALUATE_STARTUP_DELAY:10s}'
  queryTimeout: '${MOON_MARKSMAN_EVALUATE_QUERY_TIMEOUT:10s}'
  appendChannelCapacity: ${MOON_MARKSMAN_EVALUATE_APPEND_CHANNEL_CAPACITY:100}
  removeChannelCapacity: ${MOON_MARKSMAN_EVALUATE_REMOVE_CHANNEL_CAPACITY:100}

# Main time-series DB for datasource status history (prometheus / victoria_metrics).
mainTsdb:
  driver: ${MOON_MARKSMAN_MAIN_TSDB_DRIVER:METRICS_PROMETHEUS}
  url: ${MOON_MARKSMAN_MAIN_TSDB_URL:http://localhost:9090}
  basicAuth:
    enabled: ${MOON_MARKSMAN_MAIN_TSDB_BASIC_AUTH_ENABLED:false}
    username: ${MOON_MARKSMAN_MAIN_TSDB_BASIC_AUTH_USERNAME:moon.marksman}
    password: ${MOON_MARKSMAN_MAIN_TSDB_BASIC_AUTH_PASSWORD:marksman.metrics}

swaggerBasicAuth:
  enabled: ${MOON_MARKSMAN_SWAGGER_BASIC_AUTH_ENABLED:false}
  username: ${MOON_MARKSMAN_SWAGGER_BASIC_AUTH_USERNAME:moon.marksman}
  password: ${MOON_MARKSMAN_SWAGGER_BASIC_AUTH_PASSWORD:marksman.swagger}

metricsBasicAuth:
  enabled: ${MOON_MARKSMAN_METRICS_BASIC_AUTH_ENABLED:false}
  username: ${MOON_MARKSMAN_METRICS_BASIC_AUTH_USERNAME:moon.marksman}
  password: ${MOON_MARKSMAN_METRICS_BASIC_AUTH_PASSWORD:marksman.metrics}

oauth2:
  enable: ${MOON_MARKSMAN_OAUTH2_ENABLE:true}
  redirectUri: ${MOON_MARKSMAN_OAUTH2_REDIRECT_URI:http://localhost:18080/oauth2/callback}
  configs:
    - app: GITHUB
      clientId: ${MOON_MARKSMAN_OAUTH2_GITHUB_CONFIGS_CLIENT_ID:github.client.id}
      clientSecret: ${MOON_MARKSMAN_OAUTH2_GITHUB_CONFIGS_CLIENT_SECRET:github.client.secret}
      callbackUri: ${MOON_MARKSMAN_OAUTH2_GITHUB_CONFIGS_CALLBACK_URI:http://localhost:18080/oauth2/callback}
      authUrl: ${MOON_MARKSMAN_OAUTH2_GITHUB_CONFIGS_AUTH_URL:https://github.com/login/oauth/authorize}
      tokenUrl: ${MOON_MARKSMAN_OAUTH2_GITHUB_CONFIGS_TOKEN_URL:https://github.com/login/oauth/access_token}
      scopes:
        - user:email
      loginUrl: ${MOON_MARKSMAN_OAUTH2_GITHUB_CONFIGS_LOGIN_URL:https://github.com/login/oauth/authorize}
    - app: GITEE
      clientId: ${MOON_MARKSMAN_OAUTH2_GITEE_CONFIGS_CLIENT_ID:gitee.client.id}
      clientSecret: ${MOON_MARKSMAN_OAUTH2_GITEE_CONFIGS_CLIENT_SECRET:gitee.client.secret}
      callbackUri: ${MOON_MARKSMAN_OAUTH2_GITEE_CONFIGS_CALLBACK_URI:http://localhost:18080/oauth2/callback}
      authUrl: ${MOON_MARKSMAN_OAUTH2_GITEE_CONFIGS_AUTH_URL:https://gitee.com/oauth/authorize}
      tokenUrl: ${MOON_MARKSMAN_OAUTH2_GITEE_CONFIGS_TOKEN_URL:https://gitee.com/oauth/access_token}
      scopes:
        - user_info
        - emails
      loginUrl: ${MOON_MARKSMAN_OAUTH2_GITEE_CONFIGS_LOGIN_URL:https://gitee.com/oauth/authorize}
    - app: FEISHU
      clientId: ${MOON_MARKSMAN_OAUTH2_FEISHU_CONFIGS_CLIENT_ID:feishu.client.id}
      clientSecret: ${MOON_MARKSMAN_OAUTH2_FEISHU_CONFIGS_CLIENT_SECRET:feishu.client.secret}
      callbackUri: ${MOON_MARKSMAN_OAUTH2_FEISHU_CONFIGS_CALLBACK_URI:http://localhost:18080/oauth2/callback}
      authUrl: ${MOON_MARKSMAN_OAUTH2_FEISHU_CONFIGS_AUTH_URL:https://open.feishu.cn/open-apis/authen/v1/authorize}
      tokenUrl: ${MOON_MARKSMAN_OAUTH2_FEISHU_CONFIGS_TOKEN_URL:https://open.feishu.cn/open-apis/authen/v1/access_token}
      scopes:
        - user:email
      loginUrl: ${MOON_MARKSMAN_OAUTH2_FEISHU_CONFIGS_LOGIN_URL:https://open.feishu.cn/open-apis/authen/v1/authorize}

database:
  dialector: ${MOON_MARKSMAN_DATABASE_DIALECTOR:SQLITE}
  debug: ${MOON_MARKSMAN_DATABASE_DEBUG:true}
  useSystemLogger: ${MOON_MARKSMAN_DATABASE_USE_SYSTEM_LOGGER:false}
  options:
    '@type': '${MOON_MARKSMAN_DATABASE_OPTIONS_TYPE:type.googleapis.com/magicbox.config.SQLiteOptions}'
    dsn: '${MOON_MARKSMAN_DATABASE_SQLITE_OPTIONS_DSN:file:./marksman.db?cache=shared}'
