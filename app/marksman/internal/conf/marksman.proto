syntax = "proto3";

package marksman.internal.conf;

import "google/protobuf/duration.proto";
import "magicbox/config/config.proto";
import "magicbox/enum/enum.proto";

option go_package = "github.com/aide-family/marksman/internal/conf;conf";

message Bootstrap {
	magicbox.enum.Environment environment = 1;
	string useRandomID = 2;
	Server server = 3;
	magicbox.config.JWT jwt = 4;
	magicbox.config.BasicAuthConfig swaggerBasicAuth = 5;
	magicbox.config.BasicAuthConfig metricsBasicAuth = 6;
	string enableSwagger = 7;
	string enableMetrics = 8;
	string enableClientConfig = 9;
	MainTsdb mainTsdb = 10;
	EvaluateConfig evaluateConfig = 11;
	magicbox.config.ReportConfig report = 12;
	magicbox.config.OAuth2 oauth2 = 13;
	magicbox.config.DomainConfig namespaceDomain = 14;
	magicbox.config.DomainConfig authDomain = 15;
	magicbox.config.ORMConfig database = 16;
	magicbox.config.DomainConfig selfDomain = 17;
	magicbox.config.DomainConfig userDomain = 18;
	magicbox.config.DomainConfig memberDomain = 19;
	magicbox.config.DomainConfig captchaDomain = 20;
	magicbox.config.DomainConfig webhookDomain = 21;
	magicbox.config.DomainConfig messageTemplateDomain = 22;
	magicbox.config.DomainConfig senderDomain = 23;
}

// EvaluateConfig configures the metric evaluate cron: concurrency, timeouts and job channel capacity.
message EvaluateConfig {
	// Concurrency limit for errgroup when loading strategy metrics (default 10).
	int32 concurrencyLimit = 1;
	// Delay before starting to load all strategy metrics (default 10s).
	google.protobuf.Duration startupDelay = 2;
	// Timeout for query when loading (default 10s).
	google.protobuf.Duration queryTimeout = 3;
	// Capacity of the metric-append job channel (default 100).
	uint32 appendChannelCapacity = 4;
	// Capacity of the metric-remove job channel (default 100).
	uint32 removeChannelCapacity = 5;
	// Capacity of the alert event channel for metric evaluation (default 1000).
	uint32 alertEventChannelCapacity = 6;
}

// MainTsdb config for querying metrics (e.g. marksman_datasource_status).
message MainTsdb {
	// Driver: "prometheus" or "victoria_metrics".
	magicbox.enum.DatasourceDriver driver = 1;
	// Base URL, e.g. http://localhost:9090
	string url = 2;
	magicbox.config.BasicAuthConfig basicAuth = 3;
}

message Server {
	message ServerConfig {
		string address = 1;
		string network = 2;
		google.protobuf.Duration timeout = 3;
		magicbox.config.Protocol protocol = 4;
	}
	
	string name = 1;
	map<string, string> metadata = 2;
	ServerConfig http = 3;
	ServerConfig grpc = 4;
	ServerConfig job = 5;
}

message JobCore {
	int32 workerTotal = 1;
	google.protobuf.Duration timeout = 2;
	uint32 bufferSize = 3;
}