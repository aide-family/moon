env:
  name: kubemoon_server
  version: 0.0.1
  env: dev
  metadata:
    description: Kubemoon Server APP
    version: 0.0.1
    author: 梧桐
    license: MIT
    email: aidecloud@163.com
    url: https://github.com/aide-family/moon

server:
  http:
    addr: 0.0.0.0:8000
    timeout: 10s

log:
  filename: ./log/server.log
  level: debug
  encoder: json
  maxSize: 500
  compress: true

componentConfig:
  manager:
    leaderElection: true
    leaderElectionID: 0b860416.aide.cloud.cn
    leaderElectionNamespace: moon
    healthProbeBindAddress: :8081
