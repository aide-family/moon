# Replace placeholder values before applying to production.
apiVersion: v1
kind: Secret
metadata:
  name: moon-secrets
  namespace: moon
  labels:
    app.kubernetes.io/part-of: moon
type: Opaque
stringData:
  goddess-jwt-secret: change-me-goddess-jwt
  rabbit-jwt-secret: change-me-rabbit-jwt
  marksman-jwt-secret: change-me-marksman-jwt
  jade-tree-jwt-secret: change-me-jade-tree-jwt
  # Service keys must match goddess.serviceKey.allowedKeys and peer serviceKey configs.
  service-key-rabbit: sk-rabbit-dev
  service-key-marksman: sk-marksman-dev
