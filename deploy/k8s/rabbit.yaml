apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbit-config
  namespace: moon
  labels:
    app.kubernetes.io/name: rabbit
    app.kubernetes.io/part-of: moon
data:
  server.yaml: |
    environment: PROD
    enableSwagger: false
    enableMetrics: true
    useRandomID: false

    server:
      name: rabbit
      metadata:
        tag: rabbit
        repository: https://github.com/aide-family/moon
        author: Aide Family
        email: aidecloud@163.com
      http:
        address: "0.0.0.0:8001"
        network: tcp
        timeout: 10s
        protocol: HTTP
      grpc:
        address: "0.0.0.0:9001"
        network: tcp
        timeout: 10s
        protocol: GRPC
      job:
        address: "0.0.0.0:7001"
        network: tcp
        timeout: 10s
        protocol: GRPC

    jwt:
      secret: placeholder
      expire: 60000s
      issuer: rabbit

    serviceKey:
      allowedKeys:
        - sk-marksman-dev

    goddessDomain:
      endpoints: http://goddess.moon.svc.cluster.local:8000
      network: HTTP
      timeout: 10s
      serviceKey: sk-rabbit-dev

    swaggerBasicAuth:
      enabled: false

    metricsBasicAuth:
      enabled: false

    jobCore:
      workerTotal: 10
      timeout: 60s
      bufferSize: 1000
      maxRetry: 2

    oauth2:
      enable: false

    database:
      dialector: SQLITE
      debug: false
      useSystemLogger: false
      options:
        "@type": type.googleapis.com/magicbox.config.SQLiteOptions
        dsn: file:/data/rabbit.db?cache=shared

    jobCluster:
      name: rabbit
      endpoints: http://rabbit.moon.svc.cluster.local:8001
      timeout: 10s
      protocol: HTTP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rabbit-data
  namespace: moon
  labels:
    app.kubernetes.io/name: rabbit
    app.kubernetes.io/part-of: moon
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbit
  namespace: moon
  labels:
    app.kubernetes.io/name: rabbit
    app.kubernetes.io/part-of: moon
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rabbit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rabbit
        app.kubernetes.io/part-of: moon
    spec:
      containers:
        - name: rabbit
          image: ghcr.io/aide-family/moon/rabbit:v0.0.2
          imagePullPolicy: IfNotPresent
          args:
            - run
            - all
            - -c
            - /etc/moon/config
            - --log-level=INFO
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
            - name: grpc
              containerPort: 9001
              protocol: TCP
            - name: job
              containerPort: 7001
              protocol: TCP
          env:
            - name: MOON_RABBIT_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: moon-secrets
                  key: rabbit-jwt-secret
            - name: MOON_RABBIT_GODDESS_DOMAIN_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: moon-secrets
                  key: service-key-rabbit
            - name: MOON_RABBIT_SERVICE_KEY_MARKSMAN
              valueFrom:
                secretKeyRef:
                  name: moon-secrets
                  key: service-key-marksman
          volumeMounts:
            - name: config
              mountPath: /etc/moon/config
              readOnly: true
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: rabbit-config
        - name: data
          persistentVolumeClaim:
            claimName: rabbit-data
---
apiVersion: v1
kind: Service
metadata:
  name: rabbit
  namespace: moon
  labels:
    app.kubernetes.io/name: rabbit
    app.kubernetes.io/part-of: moon
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: rabbit
  ports:
    - name: http
      port: 8001
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 9001
      targetPort: grpc
      protocol: TCP
    - name: job
      port: 7001
      targetPort: job
      protocol: TCP
