apiVersion: apps/v1
kind: Deployment
metadata:
  name: marksman
  namespace: moon
  labels:
    app.kubernetes.io/name: marksman
    app.kubernetes.io/part-of: moon
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: marksman
  template:
    metadata:
      labels:
        app.kubernetes.io/name: marksman
        app.kubernetes.io/part-of: moon
    spec:
      containers:
        - name: marksman
          image: ghcr.io/aide-family/moon/marksman:v0.0.2
          imagePullPolicy: IfNotPresent
          args:
            - run
            - all
            - -c
            - /etc/moon/config
            - --log-level=INFO
          ports:
            - name: http
              containerPort: 8003
              protocol: TCP
            - name: grpc
              containerPort: 9003
              protocol: TCP
          env:
            - name: MOON_MARKSMAN_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: moon-secrets
                  key: marksman-jwt-secret
            - name: MOON_MARKSMAN_GODDESS_DOMAIN_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: moon-secrets
                  key: service-key-marksman
            - name: MOON_MARKSMAN_RABBIT_DOMAIN_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: moon-secrets
                  key: service-key-marksman
            - name: MOON_MARKSMAN_SERVICE_KEY_RABBIT
              valueFrom:
                secretKeyRef:
                  name: moon-secrets
                  key: service-key-rabbit
          volumeMounts:
            - name: config
              mountPath: /etc/moon/config
              readOnly: true
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: marksman-config
        - name: data
          persistentVolumeClaim:
            claimName: marksman-data
