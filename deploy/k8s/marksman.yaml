apiVersion: v1
kind: ConfigMap
metadata:
  name: marksman-config
  namespace: moon
  labels:
    app.kubernetes.io/name: marksman
    app.kubernetes.io/part-of: moon
data:
  server.yaml: |
    environment: PROD
    enableSwagger: false
    enableMetrics: true
    useRandomID: false

    server:
      name: marksman
      metadata:
        tag: marksman
        repository: https://github.com/aide-family/moon
        author: Aide Family
        email: aidecloud@163.com
      http:
        address: "0.0.0.0:8003"
        network: tcp
        timeout: 10s
        protocol: HTTP
      grpc:
        address: "0.0.0.0:9003"
        network: tcp
        timeout: 10s
        protocol: GRPC

    jwt:
      secret: placeholder
      expire: 60000s
      issuer: marksman

    serviceKey:
      allowedKeys:
        - sk-rabbit-dev

    goddessDomain:
      endpoints: http://goddess.moon.svc.cluster.local:8000
      network: HTTP
      timeout: 10s
      serviceKey: sk-marksman-dev

    rabbitDomain:
      endpoints: http://rabbit.moon.svc.cluster.local:8001
      network: HTTP
      timeout: 10s
      serviceKey: sk-marksman-dev

    evaluateConfig:
      concurrencyLimit: 10
      startupDelay: 10s
      queryTimeout: 10s
      appendChannelCapacity: 100
      removeChannelCapacity: 100

    mainTsdb:
      driver: METRICS_PROMETHEUS
      url: http://prometheus.monitoring.svc.cluster.local:9090
      basicAuth:
        enabled: false

    swaggerBasicAuth:
      enabled: false

    metricsBasicAuth:
      enabled: false

    oauth2:
      enable: false

    database:
      dialector: SQLITE
      debug: false
      useSystemLogger: false
      options:
        "@type": type.googleapis.com/magicbox.config.SQLiteOptions
        dsn: file:/data/marksman.db?cache=shared
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: marksman-data
  namespace: moon
  labels:
    app.kubernetes.io/name: marksman
    app.kubernetes.io/part-of: moon
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marksman
  namespace: moon
  labels:
    app.kubernetes.io/name: marksman
    app.kubernetes.io/part-of: moon
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: marksman
  template:
    metadata:
      labels:
        app.kubernetes.io/name: marksman
        app.kubernetes.io/part-of: moon
    spec:
      containers:
        - name: marksman
          image: ghcr.io/aide-family/moon/marksman:v0.0.2
          imagePullPolicy: IfNotPresent
          args:
            - run
            - all
            - -c
            - /etc/moon/config
            - --log-level=INFO
          ports:
            - name: http
              containerPort: 8003
              protocol: TCP
            - name: grpc
              containerPort: 9003
              protocol: TCP
          env:
            - name: MOON_MARKSMAN_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: moon-secrets
                  key: marksman-jwt-secret
            - name: MOON_MARKSMAN_GODDESS_DOMAIN_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: moon-secrets
                  key: service-key-marksman
            - name: MOON_MARKSMAN_RABBIT_DOMAIN_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: moon-secrets
                  key: service-key-marksman
            - name: MOON_MARKSMAN_SERVICE_KEY_RABBIT
              valueFrom:
                secretKeyRef:
                  name: moon-secrets
                  key: service-key-rabbit
          volumeMounts:
            - name: config
              mountPath: /etc/moon/config
              readOnly: true
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: marksman-config
        - name: data
          persistentVolumeClaim:
            claimName: marksman-data
---
apiVersion: v1
kind: Service
metadata:
  name: marksman
  namespace: moon
  labels:
    app.kubernetes.io/name: marksman
    app.kubernetes.io/part-of: moon
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: marksman
  ports:
    - name: http
      port: 8003
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 9003
      targetPort: grpc
      protocol: TCP
