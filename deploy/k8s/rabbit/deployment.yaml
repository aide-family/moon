apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbit
  namespace: moon
  labels:
    app.kubernetes.io/name: rabbit
    app.kubernetes.io/part-of: moon
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rabbit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rabbit
        app.kubernetes.io/part-of: moon
    spec:
      containers:
        - name: rabbit
          image: ghcr.io/aide-family/moon/rabbit:v0.0.2
          imagePullPolicy: IfNotPresent
          args:
            - run
            - all
            - -c
            - /etc/moon/config
            - --log-level=INFO
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
            - name: grpc
              containerPort: 9001
              protocol: TCP
            - name: job
              containerPort: 7001
              protocol: TCP
          env:
            - name: MOON_RABBIT_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: moon-secrets
                  key: rabbit-jwt-secret
            - name: MOON_RABBIT_GODDESS_DOMAIN_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: moon-secrets
                  key: service-key-rabbit
            - name: MOON_RABBIT_SERVICE_KEY_MARKSMAN
              valueFrom:
                secretKeyRef:
                  name: moon-secrets
                  key: service-key-marksman
          volumeMounts:
            - name: config
              mountPath: /etc/moon/config
              readOnly: true
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: rabbit-config
        - name: data
          persistentVolumeClaim:
            claimName: rabbit-data
