apiVersion: v1
kind: ConfigMap
metadata:
  name: jade-tree-config
  namespace: moon
  labels:
    app.kubernetes.io/name: jade-tree
    app.kubernetes.io/part-of: moon
data:
  server.yaml: |
    environment: PROD
    enableSwagger: false
    enableMetrics: true
    useRandomID: false
    enableClientConfig: false

    server:
      name: jade_tree
      metadata:
        tag: jade_tree
        repository: https://github.com/aide-family/moon
        author: Aide Family
        email: aidecloud@163.com
      http:
        address: "0.0.0.0:8004"
        network: tcp
        timeout: 10s
        protocol: HTTP
      grpc:
        address: "0.0.0.0:9004"
        network: tcp
        timeout: 10s
        protocol: GRPC

    swaggerBasicAuth:
      enabled: false

    metricsBasicAuth:
      enabled: false

    jwt:
      secret: placeholder
      expire: 60000s
      issuer: jade_tree

    database:
      dialector: SQLITE
      debug: false
      useSystemLogger: false
      options:
        "@type": type.googleapis.com/magicbox.config.SQLiteOptions
        dsn: file:/data/jade_tree.db?cache=shared

    probe:
      enabled: false

    collectSelf:
      enabled: true
      timeout: 60s
      interval: 60s

    machineInfoReport:
      enabled: false
      interval: 600s
      timeout: 10s
      endpoints:
        - http://jade-tree.moon.svc.cluster.local:8004/v1/machine-info/report
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jade-tree-data
  namespace: moon
  labels:
    app.kubernetes.io/name: jade-tree
    app.kubernetes.io/part-of: moon
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jade-tree
  namespace: moon
  labels:
    app.kubernetes.io/name: jade-tree
    app.kubernetes.io/part-of: moon
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: jade-tree
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jade-tree
        app.kubernetes.io/part-of: moon
    spec:
      containers:
        - name: jade-tree
          image: ghcr.io/aide-family/moon/jade_tree:v0.0.2
          imagePullPolicy: IfNotPresent
          args:
            - run
            - all
            - -c
            - /etc/moon/config
            - --log-level=INFO
          ports:
            - name: http
              containerPort: 8004
              protocol: TCP
            - name: grpc
              containerPort: 9004
              protocol: TCP
          env:
            - name: MOON_JADE_TREE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: moon-secrets
                  key: jade-tree-jwt-secret
          volumeMounts:
            - name: config
              mountPath: /etc/moon/config
              readOnly: true
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: jade-tree-config
        - name: data
          persistentVolumeClaim:
            claimName: jade-tree-data
---
apiVersion: v1
kind: Service
metadata:
  name: jade-tree
  namespace: moon
  labels:
    app.kubernetes.io/name: jade-tree
    app.kubernetes.io/part-of: moon
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: jade-tree
  ports:
    - name: http
      port: 8004
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 9004
      targetPort: grpc
      protocol: TCP
